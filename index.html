<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>楊凱網頁快速連接首頁</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top bar -->
  <div id="top-bar">
    <div id="page-title">楊凱網頁快速連接</div>
    <div id="top-right">
      <div id="header-links-container">
        <a href="https://yang-s-k.github.io/web_RTC/" target="_blank" rel="noopener">WebRTC服務</a>
      </div>
      <button id="admin-btn" onclick="location.href='admin.html'">⚙️ 後台</button>
      <div id="user-info">
        <span id="user-label"></span>
        <button id="logout-btn">登出</button>
      </div>
      <button id="login-btn">登入</button>
      <button id="toggle-theme">🌙</button>
    </div>
  </div>

  <!-- Quote -->
  <div id="quote-box">
    <div id="quote-date"></div>
    <div id="quote-text">
      <div id="quote-inner">
        <span id="quote-line"></span>
        <button id="quote-button">換一句</button>
      </div>
    </div>
  </div>

  <!-- Search -->
  <input type="text" id="search-box" placeholder="搜尋連結..." autocomplete="off">

  <!-- Pinned links -->
  <div id="pinned-section" style="display:none;">
    <h2>📌 置頂</h2>
    <div class="link-grid"></div>
  </div>

  <!-- Dynamic sections -->
  <div id="linkSections"></div>

  <!-- Login modal -->
  <div id="login-modal" class="hidden">
    <div class="modal-card">
      <h2>登入</h2>
      <input type="text"     id="modal-userid"   placeholder="帳號 ID"
             name="username" autocomplete="username">
      <input type="password" id="modal-password" placeholder="密碼"
             name="password" autocomplete="current-password">
      <button class="modal-submit" id="modal-submit">登入系統</button>
      <div id="modal-msg"></div>
      <button class="modal-close" id="modal-close">取消</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
